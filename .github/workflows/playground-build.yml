name: Playground build

on:
  pull_request:
    paths:
      - "apps/playground/**"
      - "packages/tokens/**"
      - "packages/ui/**"
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/playground/**"
      - "packages/tokens/**"
      - "packages/ui/**"

jobs:
  playground-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm playground:build
