name: Tokens governance report

on:
  pull_request:
    paths:
      - "packages/tokens/**"

jobs:
  governance-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run governance report
        env:
          NEUREX_CONTRAST_POLICY: ci
        run: pnpm --filter @neurex/tokens governance:report
