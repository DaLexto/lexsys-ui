name: Tokens governance report

on:
  pull_request:
    paths:
      - "packages/tokens/**"

jobs:
  governance-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run governance report
        env:
          LEXSYS_CONTRAST_POLICY: ci
        run: pnpm tokens:governance:report
