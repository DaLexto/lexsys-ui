name: Monorepo check

on:
  pull_request:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      tokens: ${{ steps.filter.outputs.tokens }}
      ui: ${{ steps.filter.outputs.ui }}
      registry: ${{ steps.filter.outputs.registry }}
      cli: ${{ steps.filter.outputs.cli }}
      playground: ${{ steps.filter.outputs.playground }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            tokens:
              - 'packages/tokens/**'
            ui:
              - 'packages/ui/**'
            registry:
              - 'packages/registry/**'
              - 'packages/ui/**'
            cli:
              - 'packages/cli/**'
            playground:
              - 'apps/playground/**'
              - 'packages/tokens/**'
              - 'packages/ui/**'
            root:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - 'eslint.config.mjs'
              - 'prettier.config.mjs'
              - 'tsconfig*.json'
              - 'docs/**'
              - '.github/**'
              - 'AGENTS.md'
              - 'README.md'
              - '.agents/**'

  tokens-check:
    needs: changes
    if: needs.changes.outputs.tokens == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tokens:check

  ui-check:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ui:check

  registry-check:
    needs: changes
    if: needs.changes.outputs.registry == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm registry:check

  cli-check:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run check --filter=./packages/cli

  playground-build:
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm playground:build

  root-check:
    needs: changes
    if: needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint:root

  full-check:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
